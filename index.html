<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="web/icon.png">
    <title>B++ | El lenguaje de transpilación universal</title>
    <style>
        :root { --java-red: #E74C3C; --java-blue: #2980B9; --bg-gray: #F4F4F4; }
        body { font-family: Arial, sans-serif; color: #333; margin: 0; padding: 0; background: white; }
        .navbar { background: #333; padding: 10px 0; text-align: center; color: white; font-size: 14px; }
        .container { max-width: 960px; margin: auto; padding: 0 20px; }
        header { background: var(--bg-gray); border-bottom: 4px solid var(--java-red); padding: 50px 0; }
        .hero { display: flex; align-items: center; gap: 40px; }
        .logo-img { width: 130px; height: 130px; }
        h1 { font-size: 34px; margin: 0 0 10px 0; }
        .hero-text { font-size: 19px; color: #555; margin-bottom: 30px; }
        .btn-download { background: var(--java-red); color: white; padding: 18px 40px; font-size: 22px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; }
        .page { display: none; padding: 40px 0; }
        .active { display: block; }
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .file-list { list-style: none; padding: 0; border: 1px solid #EEE; border-radius: 4px; }
        .file-item { padding: 20px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; }
        .dl-link { background: var(--java-blue); color: white; text-decoration: none; padding: 8px 20px; border-radius: 3px; font-weight: bold; }
        footer { background: #333; color: #ccc; text-align: center; padding: 30px 0; margin-top: 60px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="navbar">Sitio oficial B++ | Estado: Estable</div>

    <div id="home" class="page active">
        <header>
            <div class="container hero">
                <img src="web/icon.png" class="logo-img">
                <div>
                    <h1>Descarga gratuita de B++</h1>
                    <p class="hero-text">Obtenga el lenguaje que potencia la transpilación nativa.</p>
                    <button class="btn-download" onclick="location.href='#download-page'">Ver descargas</button>
                </div>
            </div>
        </header>
    </div>

    <div id="download-page" class="page active">
        <div class="container">
            <h2>Repositorio de Descargas</h2>
            <ul class="file-list">
                <li class="file-item">
                    <div><b>B++ SDK v0.3</b><span>Versión estable</span></div>
                    <a href="Descargas/sdk_v0.3.py" class="dl-link">Descargar</a>
                </li>
            </ul>
        </div>
    </div>

    <footer>
        <div class="container">© 2026 B++ CORE // DEVELOPED BY INSANO DE CARTÓN_MC</div>
    </footer>

    <script>
        // Si necesitas que las secciones cambien sin recargar, puedes usar esto:
        // Pero he dejado ambas activas por defecto para asegurar visibilidad en GH Pages.
    </script>
</body>
</html>
